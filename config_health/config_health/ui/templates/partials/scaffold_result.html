<div class="space-y-5">
    {% for r in results %}
    <div>
        <div class="flex items-center gap-2 mb-2">
            {% if r.success %}
            <span class="text-emerald-400">&#10003;</span>
            {% else %}
            <span class="text-red-400">&#10005;</span>
            {% endif %}
            <span class="text-sm font-medium text-gray-300">{{ r.task }}</span>
            {% if r.get('saved') %}
            <span class="text-[10px] px-2 py-0.5 rounded-md bg-emerald-500/10 text-emerald-400 font-medium">saved</span>
            {% endif %}
        </div>
        {% if r.success %}
        <pre class="bg-surface-950 border border-white/5 rounded-lg p-3 text-xs text-gray-400 font-mono overflow-x-auto max-h-64 overflow-y-auto leading-relaxed"><code>{{ r.content }}</code></pre>
        {% else %}
        <div class="text-sm text-red-400 bg-red-500/5 border border-red-500/10 rounded-lg p-3">{{ r.content }}</div>
        {% endif %}
    </div>
    {% endfor %}
</div>
