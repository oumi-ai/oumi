<div class="space-y-4">
    {% for r in results %}
    <div>
        <div class="flex items-center gap-2 mb-1.5 text-[12px]">
            {% if r.success %}
            <span class="text-emerald-600">✓</span>
            {% else %}
            <span class="text-red-500">✗</span>
            {% endif %}
            <span class="text-gray-800 font-medium">{{ r.task }}</span>
            {% if r.get('saved') %}
            <span class="text-[10px] text-emerald-500">saved</span>
            {% endif %}
        </div>
        {% if r.success %}
        <pre class="bg-gray-50 border border-gray-200 rounded p-3 text-[11px] text-gray-600 font-mono overflow-x-auto max-h-56 overflow-y-auto leading-relaxed"><code>{{ r.content }}</code></pre>
        {% else %}
        <div class="text-[12px] text-red-600">{{ r.content }}</div>
        {% endif %}
    </div>
    {% endfor %}
</div>
