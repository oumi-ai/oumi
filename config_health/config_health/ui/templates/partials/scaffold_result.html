<div class="space-y-4">
    {% for r in results %}
    <div>
        <div class="flex items-center gap-2 mb-2">
            {% if r.success %}
            <span class="text-emerald-400">&#10003;</span>
            {% else %}
            <span class="text-red-400">&#10005;</span>
            {% endif %}
            <span class="text-sm font-medium text-gray-300">{{ r.task }}</span>
            {% if r.get('saved') %}
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-900/40 text-emerald-400">saved</span>
            {% endif %}
        </div>
        {% if r.success %}
        <pre class="bg-gray-950 border border-gray-800 rounded-md p-3 text-xs text-gray-400 font-mono overflow-x-auto max-h-64 overflow-y-auto"><code>{{ r.content }}</code></pre>
        {% else %}
        <div class="text-sm text-red-400">{{ r.content }}</div>
        {% endif %}
    </div>
    {% endfor %}
</div>
