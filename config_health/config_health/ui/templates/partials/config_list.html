{% for entry in entries %}
<div class="config-row px-3.5 py-2.5 cursor-pointer border-b border-gray-100"
     hx-get="/api/config-detail/{{ entry.path }}" hx-target="#detail-panel"
     onclick="document.querySelectorAll('.config-row').forEach(r=>r.classList.remove('active'));this.classList.add('active')">
    <div class="flex items-center gap-2.5">
        {% if entry.path in all_fail_paths %}
        <span class="w-2 h-2 rounded-full bg-red-500 flex-shrink-0"></span>
        {% elif entry.path in all_warn_paths %}
        <span class="w-2 h-2 rounded-full bg-amber-500 flex-shrink-0"></span>
        {% else %}
        <span class="w-2 h-2 rounded-full bg-emerald-500/50 flex-shrink-0"></span>
        {% endif %}
        <span class="text-sm text-gray-700 truncate font-mono leading-tight flex-1">{{ entry.short_path }}</span>
        <span class="text-xs text-gray-400 flex-shrink-0">{{ entry.config_type.value }}</span>
    </div>
</div>
{% endfor %}
{% if not entries %}
<div class="px-4 py-10 text-center text-sm text-gray-400">No configs match</div>
{% endif %}
