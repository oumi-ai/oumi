<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>{% block title %}Config Health{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕</text></svg>">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'system-ui', 'sans-serif'],
                        mono: ['IBM Plex Mono', 'ui-monospace', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-600 min-h-screen font-sans antialiased">
    <header class="border-b border-gray-200 sticky top-0 z-50 bg-white/90 backdrop-blur-sm">
        <div class="max-w-[1440px] mx-auto h-12 px-5 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <span class="text-sm font-semibold text-gray-900 tracking-tight font-mono">config-health</span>
                <nav class="flex items-center gap-1">
                    <a href="/" class="text-sm px-3 py-1.5 rounded {% block nav_dashboard %}text-gray-400 hover:text-gray-700{% endblock %} transition-colors">Dashboard</a>
                    <a href="/coverage" class="text-sm px-3 py-1.5 rounded {% block nav_coverage %}text-gray-400 hover:text-gray-700{% endblock %} transition-colors">Coverage</a>
                    <a href="/scaffold" class="text-sm px-3 py-1.5 rounded {% block nav_scaffold %}text-gray-400 hover:text-gray-700{% endblock %} transition-colors">Scaffold</a>
                </nav>
            </div>
            <form hx-post="/api/rescan" hx-target="body" class="inline">
                <button type="submit" class="text-sm px-3 py-1.5 text-gray-400 hover:text-gray-700 border border-gray-200 hover:border-gray-300 rounded transition-colors flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 htmx-indicator animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
                    Rescan
                </button>
            </form>
        </div>
    </header>
    <main class="max-w-[1440px] mx-auto px-5 py-5">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
