model:
  model_name: "moonshotai/Kimi-K2-Instruct"
  trust_remote_code: true
  torch_dtype_str: "bfloat16"

generation:
  max_new_tokens: 4096
  n: 1
  temperature: 0.95
  skip_special_tokens: False

remote_params:
  num_workers: 200


output_path: "output/kimi_k2_instruct_baseline.jsonl"

engine: "TOGETHER"
