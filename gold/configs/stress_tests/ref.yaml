model:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  model_max_length: 8192
  # Must set to float32 for mixed precision training, else error will be raised
  # See: https://docs.google.com/document/d/1AACWZv0X_iFDKkpmo6AJLKpBFltaYEGkVTtXtfk5xh0/edit?tab=t.wt3qnz8tbz2q
  torch_dtype_str: "float32"
  load_pretrained_weights: True
  trust_remote_code: False
  attn_implementation: "sdpa"

data:
  train:
    datasets:
      - dataset_name: text_sft_jsonl
        dataset_kwargs:
          return_conversations: True
          return_conversations_format: "dict"
    target_col: "messages"
    seed: 42
  validation:
    datasets:
      - dataset_name: text_sft_jsonl
        dataset_kwargs:
          return_conversations: True
          return_conversations_format: "dict"
    target_col: "messages"
    seed: 42

training:
  use_peft: False
  trainer_type: "TRL_GOLD"
  output_dir: "output"
  run_name: "placeholder_run_name"

  # Training duration
  num_train_epochs: 1
  # # Effective batch size on 8-gpu node: 1 * 16 * 8
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 16
  max_grad_norm: 1.0

  # Mixed precision and performance
  mixed_precision_dtype: BF16
  enable_gradient_checkpointing: True

  # Optimization
  optimizer: "adamw_torch_fused"
  learning_rate: 1.0e-05
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01

  # Checkpointing
  save_steps: 100

  # Logging
  logging_steps: 1
  log_level: "info"
  enable_wandb: True
  enable_tensorboard: False
  log_model_summary: False

  # GOLD parameters
  gold:
    teacher_model_name_or_path: "meta-llama/Llama-3.3-70B-Instruct"

    teacher_model_init_kwargs:
      dtype: "auto"
      trust_remote_code: False
      attn_implementation: "kernels-community/vllm-flash-attn3"
      device_map: "auto"

    # Generation parameters
    temperature: 1.0
    max_completion_length: 2048

    # On-Policy Distillation parameters
    lmbda: 0.5  # 50% on-policy, 50% off-policy
    beta: 1.0   # Inverse JSD
    disable_dropout: True
    seq_kd: False

    use_uld_loss: True
    uld_use_hybrid_loss: True

    # vLLM colocate mode - runs vLLM in-process (no separate server)
    use_vllm: True
    vllm_mode: "colocate"  # In-process mode
    vllm_gpu_memory_utilization: 0.4  # Lower since teacher also needs memory
