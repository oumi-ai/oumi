# JAX inference config for DeepSeek R1 Distill Llama 8B.
# Uses Llama3 architecture with distilled R1 reasoning capabilities.
#
# Experimental: JAX backend is under active development.
#
# Requirements:
#   - Install JAX dependencies: `pip install oumi[jax]`
#
# Usage:
#   oumi infer -i -c configs/examples/jax_inference/deepseek_r1_basic.yaml

model:
  model_name: "deepseek-ai/DeepSeek-R1-Distill-Llama-8B"
  model_max_length: 4096
  torch_dtype_str: "bfloat16"
  load_pretrained_weights: true
  trust_remote_code: true

generation:
  max_new_tokens: 1024
  temperature: 0.8
  top_p: 0.95

engine: JAX
