# Distributed JAX inference config for GPT OSS 20B.
# JAX automatically handles tensor parallelism across available devices.
#
# Experimental: JAX backend is under active development.
#
# Requirements:
#   - Install JAX dependencies: `pip install oumi[jax]`
#   - Multiple GPUs or TPU pod
#
# Usage:
#   oumi infer -i -c configs/examples/jax_inference/gpt_oss_distributed.yaml

model:
  model_name: "openai/gpt-oss-20b"
  model_max_length: 2048
  torch_dtype_str: "bfloat16"
  load_pretrained_weights: true
  trust_remote_code: true

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9

engine: JAX
