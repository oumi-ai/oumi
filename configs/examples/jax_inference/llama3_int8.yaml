# JAX inference config for Llama 3.1 8B with INT8 quantization.
# INT8 quantization is auto-configured by the JAX engine based on model config.
#
# Experimental: JAX backend is under active development.
#
# Requirements:
#   - Install JAX dependencies: `pip install oumi[jax]`
#   - Log into HF: `huggingface-cli login`
#
# Usage:
#   oumi infer -i -c configs/examples/jax_inference/llama3_int8.yaml

model:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  model_max_length: 4096
  torch_dtype_str: "bfloat16"
  load_pretrained_weights: true
  trust_remote_code: true

generation:
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9

engine: JAX
