# Basic JAX inference config for Kimi K2.
#
# Experimental: JAX backend is under active development.
#
# Requirements:
#   - Install JAX dependencies: `pip install oumi[jax]`
#   - Multi-host TPU cluster recommended (1T parameter model)
#
# Usage:
#   oumi infer -i -c configs/examples/jax_inference/kimi_k2_basic.yaml
#
# See Also:
#   - JAX LLM Examples: https://github.com/jax-ml/jax-llm-examples
#   - Config class: oumi.core.configs.InferenceConfig

model:
  model_name: "moonshotai/Kimi-K2-Instruct"
  model_max_length: 4096
  torch_dtype_str: "bfloat16"
  load_pretrained_weights: true
  trust_remote_code: true

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9

engine: JAX
