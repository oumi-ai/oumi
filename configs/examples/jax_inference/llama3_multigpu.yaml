# Multi-device JAX inference config for Llama 3.1 8B.
# JAX automatically uses all available devices for tensor parallelism.
#
# Experimental: JAX backend is under active development.
#
# Requirements:
#   - Install JAX dependencies: `pip install oumi[jax]`
#   - Multiple GPUs or TPU with NVLink/interconnect
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0,1,2,3 oumi infer -i -c configs/examples/jax_inference/llama3_multigpu.yaml

model:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  model_max_length: 8192
  torch_dtype_str: "bfloat16"
  load_pretrained_weights: true
  trust_remote_code: true

generation:
  max_new_tokens: 2048
  temperature: 0.7
  top_p: 0.9

engine: JAX
