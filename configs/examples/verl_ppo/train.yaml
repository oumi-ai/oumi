# VERL PPO training config using a small LLM model
#
# This config demonstrates integrating VERL's PPO implementation for training
# reinforcement learning from human feedback (RLHF) models.
#
# Requirements:
#   - Oumi with VERL integration
#   - Log into WandB (`wandb login`) or disable `enable_wandb`
#   - Ray cluster (initialized by VERL)
#
# Usage:
#   oumi train -c configs/examples/verl_ppo/train.yaml

model:
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"
  model_max_length: 2048
  torch_dtype_str: "bfloat16"
  attn_implementation: "sdpa"

data:
  train:
    datasets:
      - dataset_name: "openai/gsm8k"
        split: "train"
        dataset_kwargs: {}

training:
  trainer_type: "VERL_PPO"
  save_steps: 500
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  
  # VERL-specific parameters
  verl_params:
    adv_estimator: "GAE"  # Standard PPO
    training_strategy: "FSDP"
    rollout_engine: "VLLM"
    n_gpus_per_node: 2  # Adjust based on available GPUs
    nnodes: 1
    use_reward_model: false
    kl_ctrl_type: "fixed"
    kl_coef: 0.001
    target_kl: 0.1
    kl_horizon: 10000

  # General training parameters
  ddp_find_unused_parameters: false
  optimizer: "adamw_torch"
  learning_rate: 1.0e-6
  empty_device_cache_steps: 1
  max_steps: 500
  logging_steps: 10
  log_model_summary: false
  output_dir: "output/verl_ppo_smollm"
  enable_wandb: true