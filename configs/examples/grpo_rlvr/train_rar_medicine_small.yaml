# RaR (Rubrics as Rewards) training config for RaR-Medicine dataset - SMALL VERSION
#
# This is a smaller configuration for testing on consumer GPUs (e.g., single 24GB GPU).
# Uses a smaller model and reduced batch size/generations while keeping the core method.
#
# For the full paper reproduction, use train_rar_medicine.yaml
#
# Requirements:
#   - Set OPENAI_API_KEY environment variable (for the judge model)
#   - ~16-24GB GPU memory
#
# Usage:
#   oumi train -c configs/examples/grpo_rlvr/train_rar_medicine_small.yaml

model:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"  # Smaller model for testing
  model_max_length: 2048
  torch_dtype_str: "bfloat16"
  attn_implementation: "sdpa"

data:
  train:
    datasets:
      - dataset_name: "rar-medicine"
        split: "train"

training:
  trainer_type: "TRL_GRPO"
  save_steps: 50
  max_steps: 100  # Reduced for testing

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 5e-6
  lr_scheduler_type: "constant_with_warmup"
  warmup_ratio: 0.1

  reward_functions: ["rubric_reward"]

  enable_gradient_checkpointing: True
  gradient_checkpointing_kwargs:
    use_reentrant: False
  ddp_find_unused_parameters: False
  optimizer: "adamw_torch"
  empty_device_cache_steps: 1

  grpo:
    num_generations: 4  # Reduced from 16 for memory
    max_prompt_length: 512
    max_completion_length: 1024
    temperature: 1.0
    use_vllm: True
    vllm_gpu_memory_utilization: 0.4
    epsilon: 0.2
    remove_unused_columns: False

  dataloader_num_workers: "auto"
  dataloader_prefetch_factor: 16

  logging_steps: 5
  log_model_summary: False
  output_dir: "output/rar_medicine_small.grpo"
  include_performance_metrics: False
  enable_wandb: True

  trainer_kwargs:
    vllm_mode: "colocate"
