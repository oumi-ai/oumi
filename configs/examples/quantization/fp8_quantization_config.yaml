# FP8 dynamic quantization config for TinyLlama.
#
# This is a data-free method (no calibration dataset needed) that produces
# FP8 models optimized for vLLM serving on Hopper+ GPUs (H100, H200).
#
# Usage:
#   oumi quantize -c configs/examples/quantization/fp8_quantization_config.yaml
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/quantization.html
#   - Config class: oumi.core.configs.QuantizationConfig
#   - Config source: https://github.com/oumi-ai/oumi/blob/main/src/oumi/core/configs/quantization_config.py
#   - Other quantization configs: configs/examples/quantization/*quantization_config.yaml

# Model configuration
model:
  model_name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"

# Quantization settings
method: "fp8_dynamic"
output_path: "tinyllama-1.1b-fp8"
