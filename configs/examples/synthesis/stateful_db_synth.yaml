# Database assistant with stateful tool synthesis.
#
# Generates multi-turn conversations between a property operations analyst and
# a SQL database assistant. The environment maintains actual table state:
# inserts, updates, and deletes mutate it, while queries return results
# consistent with it.
#
# Usage:
#   oumi synth -c configs/examples/synthesis/stateful_db_synth.yaml

strategy: GENERAL
num_samples: 5
output_path: stateful_db_dataset.jsonl

strategy_params:
  sampled_attributes:
    - id: task_type
      name: Task Type
      description: What the property operations analyst needs to accomplish
      possible_values:
        - id: delinquency_review
          name: Delinquency Review
          description: Investigate overdue rent balances, identify impacted tenants, and verify any balance corrections
          sample_rate: 0.3
        - id: maintenance_followup
          name: Maintenance Follow-Up
          description: Review maintenance work orders, update statuses or assignments, and confirm the backlog is accurate
          sample_rate: 0.25
        - id: lease_audit
          name: Lease Audit
          description: Find incorrect or expiring lease records, make corrections, and verify the lease data afterward
          sample_rate: 0.2
        - id: occupancy_report
          name: Occupancy Reporting
          description: Compile an occupancy, vacancy, or rent-roll style summary from current property management data
          sample_rate: 0.25

    - id: complexity
      name: Query Complexity
      description: How complex the database operations are
      possible_values:
        - id: simple
          name: Simple
          description: Single-table lookups, basic filters, and straightforward record updates
          sample_rate: 0.3
        - id: moderate
          name: Moderate
          description: Multi-table joins, grouped summaries, and conditional updates across related property data
          sample_rate: 0.45
        - id: complex
          name: Complex
          description: Multi-step investigations, subqueries, and write-plus-verification workflows over several tables
          sample_rate: 0.25

  environments:
    - id: database
      name: PropertyManagementDatabase
      description: >
        A grounded PostgreSQL property management database for one apartment
        portfolio. State represents the current contents of realistic tables
        such as properties, units, tenants, leases, payments, and work_orders.
        Use realistic names, addresses, dates, rent amounts, balances, and
        maintenance statuses. Keep the environment internally consistent and
        reusable across conversations.
      system_prompt: |
        You are a PostgreSQL property management database engine. Execute queries
        against the current state and return accurate results. Rules:

        1. SELECT: return ONLY rows matching the query from current state.
           Never fabricate rows that do not exist. If no rows match, return an
           empty result set.
        2. INSERT: auto-generate sequential integer IDs when needed. Enforce
           UNIQUE and foreign key constraints — reject inserts that violate them.
        3. UPDATE: modify only rows matching the WHERE clause. Return the count
           of actually changed rows.
        4. DELETE: remove only matching rows. Return the count of deleted rows.
        5. DDL statements are NOT supported. If the SQL uses CREATE TABLE,
           ALTER TABLE, DROP TABLE, TRUNCATE, or other schema-changing commands,
           return a JSON error response and do not change state.
        6. JOINs must correctly match on the join condition. Do not invent
           matching rows.
        7. Aggregations (COUNT, SUM, AVG, MIN, MAX, etc.) must be computed from
           the actual rows in the current state.
        8. Use PostgreSQL syntax and semantics consistently. Do not accept MySQL,
           SQLite, or other dialect-specific syntax unless PostgreSQL also
           supports it.
        9. If a table or column does not exist, return a clear error.
        10. Monetary values should be realistic for residential property
            management. Dates should use 2024-2025 values.

  tools:
    - id: run_query
      name: RunQuery
      description: Execute a read-only PostgreSQL SELECT query against the property management database and return results
      output_strategy: ENVIRONMENT
      environment: database
      read_only: true
      parameters:
        type: object
        properties:
          sql:
            type: string
            description: A PostgreSQL SELECT query to execute
        required: [sql]
        additionalProperties: false
      output_schema:
        type: object
        properties:
          columns:
            type: array
            items: { type: string }
          rows:
            type: array
            items:
              type: array
          row_count: { type: integer }

    - id: execute_statement
      name: ExecuteStatement
      description: Execute a PostgreSQL INSERT, UPDATE, or DELETE statement against the property management database and return affected row count
      output_strategy: ENVIRONMENT
      environment: database
      read_only: false
      parameters:
        type: object
        properties:
          sql:
            type: string
            description: A PostgreSQL INSERT, UPDATE, or DELETE statement only. DDL is not supported.
        required: [sql]
        additionalProperties: false
      output_schema:
        type: object
        properties:
          status: { type: string, enum: [success, error] }
          rows_affected: { type: integer }
          message: { type: string }

    - id: describe_table
      name: DescribeTable
      description: Show a PostgreSQL table schema including column names, types, constraints, and foreign keys
      output_strategy: ENVIRONMENT
      environment: database
      read_only: true
      parameters:
        type: object
        properties:
          table_name:
            type: string
            description: Name of the table to describe
        required: [table_name]
        additionalProperties: false
      output_schema:
        type: object
        properties:
          table_name: { type: string }
          columns:
            type: array
            items:
              type: object
              properties:
                name: { type: string }
                type: { type: string }
                nullable: { type: boolean }
                primary_key: { type: boolean }
          foreign_keys:
            type: array
            items:
              type: object
              properties:
                column: { type: string }
                references: { type: string }

    - id: list_tables
      name: ListTables
      description: List all tables in the property management database with their row counts
      output_strategy: ENVIRONMENT
      environment: database
      read_only: true
      parameters:
        type: object
        properties: {}
      output_schema:
        type: array
        items:
          type: object
          properties:
            name: { type: string }
            row_count: { type: integer }

  multiturn_attributes:
    - id: db_conversation
      min_turns: 6
      max_turns: 10
      available_tools:
        - run_query
        - execute_statement
        - describe_table
        - list_tables
      max_tool_calls_per_turn: 3
      conversation_planner: |
        Plan a conversation where a property operations analyst works with a
        database assistant on a {task_type.name} task in a property management
        database.

        Complexity: {complexity.description}
        Task: {task_type.description}

        Requirements:
        - The analyst describes the operational need in the first turn
        - The assistant explores the schema before querying business data
        - Tool calls build on each other (inspect → investigate → update → verify)
        - The task is completed and verified by the final turn
        - Keep it focused on one coherent property-management workflow

      role_instruction_messages:
        USER: |
          You are a property operations analyst working with a property
          management database.
          You need help with: {task_type.description}.
          Complexity: {complexity.description}.

          Write like a real analyst would: direct, concise, and occasionally
          informal. Do not narrate your workflow. Do not sound like an assistant.

          Be specific about what you need. React to results by asking
          follow-ups, requesting corrections, or confirming the data looks right.
          Use realistic property-management terminology like tenants, units,
          leases, balances, rent, vacancies, and work orders when relevant.
        ASSISTANT: |
          You are a database assistant helping with a PostgreSQL property
          management database.
          The analyst needs: {task_type.description}.

          Guidelines:
          1. Start by exploring the schema before querying data
          2. Use read operations for lookups and write operations for changes
          3. After every write, verify the change with a read
          4. Explain what each operation does and interpret the results
          5. If results are unexpected, investigate before proceeding
          6. Perform ONE operation at a time and wait for the result
          7. Use PostgreSQL syntax consistently
          8. Do not attempt DDL or schema changes
          9. Stay grounded in property-management entities actually present in
             the data

      output_system_prompt: |
        You are a database assistant. You help property operations analysts
        query, modify, and understand data in PostgreSQL property management
        databases. Always verify changes after writes.

  passthrough_attributes:
    - db_conversation

inference_config:
  model:
    model_name: claude-sonnet-4-20250514
  engine: ANTHROPIC
  generation:
    max_new_tokens: 8192
    temperature: 0.7
    top_p: 0.9
  remote_params:
    num_workers: 50
    politeness_policy: 5
