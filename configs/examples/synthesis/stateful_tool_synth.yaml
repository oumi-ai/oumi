# Example: Stateful tool synthesis with a property management environment.
# Environment state evolves as tools read from and write to it.
strategy: GENERAL
num_samples: 3
output_path: stateful_tool_dataset.jsonl

strategy_params:
  sampled_attributes:
    - id: issue_type
      name: Issue Type
      description: What the tenant needs help with
      possible_values:
        - id: water_utility
          name: Water Utility
          description: Questions about water billing, usage, leaks, or shutoffs
          sample_rate: 0.15
        - id: electric_utility
          name: Electric Utility
          description: Questions about electric billing, outages, meter readings, or high usage
          sample_rate: 0.15
        - id: trash_sewage
          name: Trash & Sewage
          description: Trash pickup schedules, missed pickups, dumpster issues, sewage backups
          sample_rate: 0.15
        - id: rent_payment
          name: Rent Payment
          description: Rent due dates, payment methods, late fees, lease terms
          sample_rate: 0.15
        - id: maintenance
          name: Maintenance Request
          description: HVAC repair, plumbing fix, parking lot issue, signage, lighting
          sample_rate: 0.2
        - id: lease_question
          name: Lease Question
          description: CAM charges, lease renewal, permitted use, operating hours
          sample_rate: 0.1
        - id: emergency
          name: Emergency
          description: Flood, fire, gas leak, broken pipe, power outage affecting business
          sample_rate: 0.1
  environments:
    - id: property_system
      name: PropertyManagementSystem
      description: "Tracks tenants, leases, maintenance requests, and utility accounts"
      system_prompt: |
        You manage a property management system. When tools read or modify
        state, produce results consistent with the current state. If a tenant
        or lease doesn't exist, return an appropriate error message.
      # state_schema and initial_state are auto-generated by the LLM
      # from the tool definitions and scenario context. This lets the
      # environment create tenants/state that match the conversation.

  tools:
    - id: lookup_lease
      name: LookupLease
      description: "Look up lease details for a tenant"
      output_strategy: ENVIRONMENT
      environment: property_system
      read_only: true
      parameters:
        type: object
        properties:
          tenant_id:
            type: string
            description: "The tenant's ID"
        required: [tenant_id]
      output_schema:
        type: object
        properties:
          tenant_id: { type: string }
          name: { type: string }
          unit: { type: string }
          lease_start: { type: string }
          lease_end: { type: string }
          rent: { type: number }

    - id: submit_maintenance
      name: SubmitMaintenanceRequest
      description: "Submit a new maintenance request for a tenant"
      output_strategy: ENVIRONMENT
      environment: property_system
      read_only: false
      parameters:
        type: object
        properties:
          tenant_id:
            type: string
            description: "The tenant's ID"
          description:
            type: string
            description: "Description of the maintenance issue"
        required: [tenant_id, description]
      output_schema:
        type: object
        properties:
          request_id: { type: string }
          status: { type: string }

  multiturn_attributes:
    - id: property_mgmt_conv
      min_turns: 4
      max_turns: 8
      available_tools:
        - lookup_lease
        - submit_maintenance
      max_tool_calls_per_turn: 5
      conversation_planner: |
        The tenant is calling about: {issue_type.description}.
        Plan a realistic conversation where the tenant describes their issue
        and the assistant investigates and helps resolve it.
      role_instruction_messages:
        USER: |
          You are a tenant contacting your property management company.
          Your issue: {issue_type.description}.
          Be conversational and natural. Describe your specific situation
          related to this type of issue.
        ASSISTANT: |
          You are a property management assistant. The tenant is contacting
          you about: {issue_type.description}. Use the available tools to
          look up information and help the tenant. Always verify tenant details
          before taking actions.
      output_system_prompt: |
        You are a helpful property management assistant.

inference_config:
  model:
    model_name: claude-sonnet-4-20250514
  engine: ANTHROPIC
  generation:
    max_new_tokens: 8192
    temperature: 0.7
    top_p: 0.9
  remote_params:
    num_workers: 50
    politeness_policy: 60
