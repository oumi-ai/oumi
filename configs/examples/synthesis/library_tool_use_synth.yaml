                borrow_date: "2026-04-12"
                return_date: "2026-05-12"
                status: "borrowed"
            - input: { book_id: "B008" }
              output:
                title: "The Hobbit"
                author: "J.R.R. Tolkien"
                borrower_name: "Liam O'Connor"
                borrow_date: "2026-04-14"
