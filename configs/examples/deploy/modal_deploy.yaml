# Example deployment configuration for Modal.com
# Usage: oumi deploy up --config configs/examples/deploy/modal_deploy.yaml

# Model source - must be an S3 URL for Modal deployments:
# - S3 URL: "s3://my-bucket/models/my-model/"
# Models are accessed directly from S3 via CloudBucketMount (no upload needed).
model_source: s3://my-bucket/models/my-finetuned-model/

# Provider: "modal"
provider: modal

# Display name for the deployed Modal app
model_name: my-finetuned-model-v1

# Model type: "full" or "adapter"
# Use "adapter" for LoRA adapters
model_type: full

# Base model (required only if model_type is "adapter")
# base_model: meta-llama/Llama-2-7b-hf

# Hardware configuration
hardware:
  # Available accelerators for Modal:
  # - nvidia_a100_40gb
  # - nvidia_a100_80gb
  # - nvidia_h100_80gb
  # - nvidia_a10g
  # - nvidia_l4
  # - nvidia_t4
  # Run `oumi deploy list-hardware --provider modal` to see all options
  accelerator: nvidia_a100_80gb

  # Number of GPUs
  count: 1

# Autoscaling configuration
autoscaling:
  # Minimum number of replicas (0 enables scale-to-zero for cost savings)
  min_replicas: 0

  # Maximum number of replicas
  max_replicas: 1

# Optional: test prompts to run after deployment
test_prompts:
  - "Hello, how are you?"
  - "Write a Python function to calculate fibonacci numbers."
