# QLoRA config for Qwen3-235B-A22B (MoE model with 22B activated params).
#
# Hardware Requirements:
#   - 8x H100-80GB (640GB total VRAM)
#   - Estimated ~70-75GB VRAM per GPU - TIGHT FIT
#   - CPU offload REQUIRED
#   - Aggressive memory optimization settings
#
# Requirements:
#   - transformers >= 4.51.0
#   - Log into WandB (`wandb login`) or disable `enable_wandb`
#
# Usage:
#   oumi distributed torchrun -m oumi train -c configs/recipes/qwen3/sft/235b_a22b_qlora/train.yaml
#
# MoE Best Practices:
#   - Only target attention layers (q_proj, k_proj, v_proj, o_proj)
#   - DO NOT target MLP/expert layers - sparse layers don't work well with PEFT
#   - Use 4-bit quantization (NOT 8-bit - known issues with MoE)
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/train/train.html
#   - Qwen3 Model Card: https://huggingface.co/Qwen/Qwen3-235B-A22B

model:
  model_name: "Qwen/Qwen3-235B-A22B"
  model_max_length: 8192  # Reduced for memory
  torch_dtype_str: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: True

data:
  train:
    datasets:
      - dataset_name: "yahma/alpaca-cleaned"

training:
  trainer_type: "TRL_SFT"
  use_peft: True
  save_steps: 200
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  max_grad_norm: 1.0

  enable_gradient_checkpointing: True
  gradient_checkpointing_kwargs:
    use_reentrant: False
  ddp_find_unused_parameters: False
  optimizer: "adamw_torch_fused"
  learning_rate: 1.0e-04  # Lower LR for large model stability
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01
  compile: False

  dataloader_num_workers: 4
  dataloader_prefetch_factor: 8

  logging_steps: 10
  empty_device_cache_steps: 10  # More frequent cache clearing
  output_dir: "output/qwen3_235b_a22b.qlora"
  include_performance_metrics: True
  enable_wandb: True

peft:
  q_lora: True
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_quant_storage: "bfloat16"
  bnb_4bit_compute_dtype: "bfloat16"
  lora_r: 8  # Smaller rank to reduce memory
  lora_alpha: 16
  # MoE Best Practice: Only target attention layers, NOT MLP/expert layers
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

fsdp:
  enable_fsdp: True
  cpu_offload: True  # REQUIRED for 235B model
  forward_prefetch: True
  sharding_strategy: "FULL_SHARD"
  state_dict_type: "SHARDED_STATE_DICT"
  auto_wrap_policy: "TRANSFORMER_BASED_WRAP"
  transformer_layer_cls: "Qwen3MoeDecoderLayer"
