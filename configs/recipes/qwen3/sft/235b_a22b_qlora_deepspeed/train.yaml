# QLoRA config for Qwen3-235B-A22B with DeepSpeed ZeRO-3 + Full CPU Offload.
#
# Hardware Requirements:
#   - 8x H100-80GB or equivalent
#   - DeepSpeed ZeRO-3 with full CPU offload for this 235B model
#   - Requires significant CPU RAM (recommend 512GB+ system RAM)
#   - This is pushing the limits of single-node training
#
# Requirements:
#   - transformers >= 4.51.0
#   - Log into WandB (`wandb login`) or disable `enable_wandb`
#
# Usage:
#   oumi train -c configs/recipes/qwen3/sft/235b_a22b_qlora_deepspeed/train.yaml
#
# MoE Best Practices:
#   - Only target attention layers (q_proj, k_proj, v_proj, o_proj)
#   - DO NOT target MLP/expert layers - sparse layers don't work well with PEFT
#   - DeepSpeed ZeRO-3 + offload enables training of very large models
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/train/train.html
#   - DeepSpeed MoE: https://www.deepspeed.ai/tutorials/mixture-of-experts/

model:
  model_name: "Qwen/Qwen3-235B-A22B"
  model_max_length: 8192  # Reduced for memory
  torch_dtype_str: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: True

data:
  train:
    datasets:
      - dataset_name: "yahma/alpaca-cleaned"

training:
  trainer_type: "TRL_SFT"
  use_peft: True
  save_steps: 200
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  max_grad_norm: 1.0

  enable_gradient_checkpointing: True
  gradient_checkpointing_kwargs:
    use_reentrant: False
  optimizer: "adamw_torch_fused"
  learning_rate: 1.0e-04  # Lower LR for large model stability
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01

  dataloader_num_workers: 4
  dataloader_prefetch_factor: 2

  logging_steps: 10
  empty_device_cache_steps: 10
  output_dir: "output/qwen3_235b_a22b.qlora_deepspeed"
  include_performance_metrics: True
  enable_wandb: True

peft:
  q_lora: True
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_quant_storage: "bfloat16"
  bnb_4bit_compute_dtype: "bfloat16"
  lora_r: 8  # Smaller rank to reduce memory
  lora_alpha: 16
  # MoE Best Practice: Only target attention layers, NOT MLP/expert layers
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

deepspeed:
  enable_deepspeed: True
  zero_stage: "ZERO_3"
  precision: "BF16"

  # Communication optimization
  allgather_partitions: True
  allgather_bucket_size: 100000000  # Smaller buckets for memory
  overlap_comm: True
  reduce_scatter: True
  reduce_bucket_size: 100000000
  contiguous_gradients: True
  round_robin_gradients: False

  # ZeRO-3 specific parameters - tuned for very large model
  sub_group_size: 500000000
  stage3_prefetch_bucket_size: "auto"
  stage3_param_persistence_threshold: "auto"
  stage3_max_live_parameters: 500000000
  stage3_max_reuse_distance: 500000000
  stage3_gather_16bit_weights_on_model_save: False

  # FULL CPU Offloading - REQUIRED for 235B model
  offload_optimizer:
    device: "cpu"
    pin_memory: True
    buffer_count: 4
    fast_init: True

  offload_param:
    device: "cpu"
    pin_memory: True
    buffer_count: 4
    max_in_cpu: 5000000000  # 5B params max in CPU at once

  # Memory optimization
  zero_allow_untested_optimizer: True
  zero_force_ds_cpu_optimizer: False

  # Logging
  steps_per_print: 10
  wall_clock_breakdown: False
