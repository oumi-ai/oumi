# LoRA config for DBRX-Instruct (132B MoE model with ~36B activated params).
#
# Hardware Requirements:
#   - 8x H100-80GB (640GB total VRAM)
#   - Estimated ~55GB VRAM per GPU with FSDP
#   - CPU offload recommended
#
# Known Issues:
#   - DBRX has fused expert parameters that don't work well with standard LoRA
#   - Only attention layers can be reliably targeted
#   - See: https://huggingface.co/databricks/dbrx-instruct/discussions/10
#
# Requirements:
#   - Log into WandB (`wandb login`) or disable `enable_wandb`
#
# Usage:
#   oumi distributed torchrun -m oumi train -c configs/recipes/dbrx/sft/instruct_lora/train.yaml
#
# MoE Best Practices:
#   - Only target attention layers (Wqkv, out_proj)
#   - DO NOT target expert layers - DBRX uses fused experts incompatible with PEFT
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/train/train.html
#   - DBRX Model Card: https://huggingface.co/databricks/dbrx-instruct

model:
  model_name: "databricks/dbrx-instruct"
  model_max_length: 32768
  torch_dtype_str: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: True

data:
  train:
    datasets:
      - dataset_name: "yahma/alpaca-cleaned"

training:
  trainer_type: "TRL_SFT"
  use_peft: True
  save_steps: 200
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  max_grad_norm: 1.0

  enable_gradient_checkpointing: True
  gradient_checkpointing_kwargs:
    use_reentrant: False
  ddp_find_unused_parameters: False
  optimizer: "adamw_torch_fused"
  learning_rate: 2.0e-04
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01
  compile: False

  dataloader_num_workers: "auto"
  dataloader_prefetch_factor: 16

  logging_steps: 10
  empty_device_cache_steps: 25
  output_dir: "output/dbrx_instruct.lora"
  include_performance_metrics: True
  enable_wandb: True

peft:
  lora_r: 16
  lora_alpha: 32
  # DBRX uses fused attention (Wqkv) - only target attention layers
  # Expert layers are fused and incompatible with standard LoRA
  lora_target_modules:
    - "Wqkv"
    - "out_proj"

fsdp:
  enable_fsdp: True
  cpu_offload: True
  forward_prefetch: True
  sharding_strategy: "FULL_SHARD"
  auto_wrap_policy: "TRANSFORMER_BASED_WRAP"
  transformer_layer_cls: "DbrxBlock"
