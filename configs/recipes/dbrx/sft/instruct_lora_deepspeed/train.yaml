# LoRA config for DBRX-Instruct with DeepSpeed ZeRO-3 + CPU Offload.
#
# Hardware Requirements:
#   - 8x H100-80GB or equivalent
#   - DeepSpeed ZeRO-3 with CPU offload for memory efficiency
#   - Requires sufficient CPU RAM (recommend 256GB+ system RAM)
#
# Known Issues:
#   - DBRX has fused expert parameters that don't work well with standard LoRA
#   - Only attention layers can be reliably targeted
#   - See: https://huggingface.co/databricks/dbrx-instruct/discussions/10
#
# Requirements:
#   - Log into WandB (`wandb login`) or disable `enable_wandb`
#
# Usage:
#   oumi train -c configs/recipes/dbrx/sft/instruct_lora_deepspeed/train.yaml
#
# MoE Best Practices:
#   - Only target attention layers (Wqkv, out_proj)
#   - DO NOT target expert layers - DBRX uses fused experts incompatible with PEFT
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/train/train.html
#   - DBRX Model Card: https://huggingface.co/databricks/dbrx-instruct

model:
  model_name: "databricks/dbrx-instruct"
  model_max_length: 32768
  torch_dtype_str: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: True

data:
  train:
    datasets:
      - dataset_name: "yahma/alpaca-cleaned"

training:
  trainer_type: "TRL_SFT"
  use_peft: True
  save_steps: 200
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0

  enable_gradient_checkpointing: True
  gradient_checkpointing_kwargs:
    use_reentrant: False
  optimizer: "adamw_torch_fused"
  learning_rate: 2.0e-04
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01

  dataloader_num_workers: 8
  dataloader_prefetch_factor: 2

  logging_steps: 10
  empty_device_cache_steps: 25
  output_dir: "output/dbrx_instruct.lora_deepspeed"
  include_performance_metrics: True
  enable_wandb: True

peft:
  lora_r: 16
  lora_alpha: 32
  # DBRX uses fused attention (Wqkv) - only target attention layers
  lora_target_modules:
    - "Wqkv"
    - "out_proj"

deepspeed:
  enable_deepspeed: True
  zero_stage: "ZERO_3"
  precision: "BF16"

  # Communication optimization
  allgather_partitions: True
  allgather_bucket_size: 200000000
  overlap_comm: True
  reduce_scatter: True
  reduce_bucket_size: 200000000
  contiguous_gradients: True
  round_robin_gradients: False

  # ZeRO-3 specific parameters
  sub_group_size: 1000000000
  stage3_prefetch_bucket_size: "auto"
  stage3_param_persistence_threshold: "auto"
  stage3_max_live_parameters: 1000000000
  stage3_max_reuse_distance: 1000000000
  stage3_gather_16bit_weights_on_model_save: False

  # CPU Offloading - essential for DBRX 132B
  offload_optimizer:
    device: "cpu"
    pin_memory: True
    buffer_count: 4

  offload_param:
    device: "cpu"
    pin_memory: True
    buffer_count: 4

  # Memory optimization
  zero_allow_untested_optimizer: True
  zero_force_ds_cpu_optimizer: False

  # Logging
  steps_per_print: 10
  wall_clock_breakdown: False
