# LoRA overfit test: English questions → French answers on the wave image.
#
# Usage:
#   oumi train -c configs/recipes/vision/qwen3_5_0.8b/sft/0.8b_wave_enfr_lora_train.yaml

model:
  model_name: "Qwen/Qwen3.5-0.8B"
  torch_dtype_str: "bfloat16"
  model_max_length: 4096
  trust_remote_code: True
  attn_implementation: "sdpa"
  chat_template: "qwen3-vl-instruct"
  freeze_layers:
    - "model.visual"

data:
  train:
    collator_name: "vision_language_with_padding"
    use_torchdata: False
    datasets:
      - dataset_name: "vl_sft"
        dataset_path: "tests/testdata/wave_en_fr.jsonl"
        shuffle: True
        seed: 42
        transform_num_workers: 1
        dataset_kwargs:
          processor_name: "Qwen/Qwen3.5-0.8B"
          return_tensors: True

training:
  output_dir: "output/qwen3.5_wave_enfr_lora"
  trainer_type: "TRL_SFT"
  enable_gradient_checkpointing: True
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 20
  use_peft: True

  gradient_checkpointing_kwargs:
    use_reentrant: False
  max_grad_norm: 0.5
  ddp_find_unused_parameters: False
  empty_device_cache_steps: 1
  compile: False

  optimizer: "adamw_torch_fused"
  learning_rate: 1e-3
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler_type: "cosine"

  logging_steps: 10
  save_steps: 0
  dataloader_main_process_only: False
  dataloader_num_workers: 0
  include_performance_metrics: True
  log_model_summary: False
  enable_wandb: False

peft:
  peft_save_mode: "ADAPTER_ONLY"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "o_proj"
    - "k_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
