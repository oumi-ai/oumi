# Phi3 DPO train config for an Nvidia GPU with >=24GB memory.
#
# Usage:
#   oumi train -c configs/recipes/phi3/dpo/nvidia_24g_train.yaml
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/train/train.html
#   - Config class: oumi.core.configs.TrainingConfig
#   - Config source: https://github.com/oumi-ai/oumi/blob/main/src/oumi/core/configs/training_config.py
#   - Other training configs: configs/**/*train.yaml

model:
  model_name: "microsoft/Phi-3-mini-4k-instruct"
  tokenizer_pad_token: "<unk>"  # Avoid pad==eos; use <unk> as padding token per Microsoft's official fine-tuning guide:
  # https://huggingface.co/microsoft/Phi-3-mini-4k-instruct/blob/main/sample_finetune.py
  torch_dtype_str: "bfloat16"

data:
  train:
    datasets:
      - dataset_name: "mlabonne/orpo-dpo-mix-40k"

training:
  optimizer: "adamw_torch_fused"
  use_peft: true
  output_dir: "output/phi3.dpo"
  trainer_type: "TRL_DPO"
  per_device_train_batch_size: 2 # Each batch seems to be approx. 1.8GB
  gradient_accumulation_steps: 8
  logging_steps: 10

  # Use for debugging purposes
  # max_steps: 10

peft:
  q_lora: False
  lora_target_modules:
    - "qkv_proj"
