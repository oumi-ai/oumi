# LoRA config for Mixtral 8x7B with DeepSpeed ZeRO-3.
#
# Hardware Requirements:
#   - 8x H100-80GB or equivalent
#   - DeepSpeed ZeRO-3 provides maximum memory efficiency
#   - Can enable CPU offloading for even larger batch sizes
#
# Requirements:
#   - Log into WandB (`wandb login`) or disable `enable_wandb`
#
# Usage:
#   oumi train -c configs/recipes/mixtral/sft/8x7b_lora_deepspeed/train.yaml
#
# MoE Best Practices:
#   - Only target attention layers (q_proj, k_proj, v_proj, o_proj)
#   - DO NOT target MLP/expert layers - sparse layers don't work well with PEFT
#   - DeepSpeed ZeRO-3 shards parameters, gradients, and optimizer states
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/train/train.html
#   - DeepSpeed MoE: https://www.deepspeed.ai/tutorials/mixture-of-experts/

model:
  model_name: "mistralai/Mixtral-8x7B-v0.1"
  model_max_length: 32768
  torch_dtype_str: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: False

data:
  train:
    datasets:
      - dataset_name: "yahma/alpaca-cleaned"

training:
  trainer_type: "TRL_SFT"
  use_peft: True
  save_steps: 200
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0

  enable_gradient_checkpointing: True
  gradient_checkpointing_kwargs:
    use_reentrant: False
  optimizer: "adamw_torch_fused"
  learning_rate: 2.0e-04
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01

  dataloader_num_workers: 8
  dataloader_prefetch_factor: 2

  logging_steps: 10
  empty_device_cache_steps: 50
  output_dir: "output/mixtral_8x7b.lora_deepspeed"
  include_performance_metrics: True
  enable_wandb: True

peft:
  lora_r: 16
  lora_alpha: 32
  # MoE Best Practice: Only target attention layers, NOT MLP/expert layers
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

deepspeed:
  enable_deepspeed: True
  zero_stage: "ZERO_3"
  precision: "BF16"

  # Communication optimization
  allgather_partitions: True
  allgather_bucket_size: 200000000
  overlap_comm: True
  reduce_scatter: True
  reduce_bucket_size: 200000000
  contiguous_gradients: True
  round_robin_gradients: False

  # ZeRO-3 specific parameters
  sub_group_size: 1000000000
  stage3_prefetch_bucket_size: "auto"
  stage3_param_persistence_threshold: "auto"
  stage3_max_live_parameters: 1000000000
  stage3_max_reuse_distance: 1000000000
  stage3_gather_16bit_weights_on_model_save: False

  # Memory optimization
  zero_allow_untested_optimizer: True
  zero_force_ds_cpu_optimizer: False

  # Logging
  steps_per_print: 10
  wall_clock_breakdown: False
