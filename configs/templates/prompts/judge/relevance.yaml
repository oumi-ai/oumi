# Relevance Judge Template
# Used for evaluating answer relevance to questions

system_instruction: |
  You are an expert at evaluating relevance.
  Assess how well the answer addresses the question based on the given context.

prompt_template: |
  Context: {context}
  Question: {question}
  Answer: {answer}

  Is the answer relevant and accurate given the context and question?

judgment_type: BOOL
