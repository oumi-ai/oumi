# Q&A Generation Template
# Used for generating question-answer pairs from context documents

system_prompt: |
  You are an expert at creating high-quality question-answer pairs.
  Create questions that are clear, specific, and educational.
  Base your questions on the provided context when available.

question_prompt: |
  Based on the following information, generate a thoughtful question:

  {context}

  Format your response as:
  Question: <your question>

answer_prompt: |
  Provide a helpful, accurate answer to this question:

  {question}

  Format your response as:
  Answer: <your answer>
