# Oumi Train Template: Full SFT (Supervised Fine-Tuning)
# Full parameter fine-tuning of all model weights
#
# Usage:
#   oumi onboard generate --template train/full_sft --data ./your_data.jsonl -o ./train_config.yaml
#
# Best for: Maximum quality when you have sufficient GPU memory
# Typical GPU: 40GB+ per GPU, multi-GPU recommended for larger models
#
# Requirements:
#   - Log into HF: `huggingface-cli login`
#   - Optional: Log into WandB (`wandb login`) or set enable_wandb: False

model:
  # Replace with your preferred base model
  # Full fine-tuning works best with smaller models unless you have many GPUs
  # Popular options:
  #   - meta-llama/Llama-3.2-1B-Instruct (1 GPU)
  #   - meta-llama/Llama-3.2-3B-Instruct (1-2 GPUs)
  #   - meta-llama/Llama-3.1-8B-Instruct (2-4 GPUs)
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  model_max_length: 4096
  torch_dtype_str: "bfloat16"
  attn_implementation: "sdpa"
  load_pretrained_weights: true
  trust_remote_code: true

data:
  train:
    datasets:
      # Replace with your dataset path or HuggingFace dataset
      # For local files: Use path to your .jsonl file from synth output
      # For HF datasets: Use dataset_name like "your-org/your-dataset"
      - dataset_name: ???  # Required: path to training data

training:
  trainer_type: "TRL_SFT"
  use_peft: false  # Disable LoRA for full fine-tuning

  # Training duration
  num_train_epochs: 3
  save_steps: 200

  # Batch configuration
  # Effective batch = per_device_batch * gradient_accumulation * num_gpus
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4

  # Memory optimization (enable for larger models)
  enable_gradient_checkpointing: false
  gradient_checkpointing_kwargs:
    use_reentrant: false
  ddp_find_unused_parameters: false

  # Optimizer settings
  optimizer: "adamw_torch_fused"
  learning_rate: 2.0e-05  # Lower LR for full fine-tuning
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  weight_decay: 0.01

  # Data loading
  dataloader_num_workers: "auto"
  dataloader_prefetch_factor: 32

  # Logging and output
  logging_steps: 50
  log_model_summary: false
  empty_device_cache_steps: 50
  output_dir: "output/full_sft"
  include_performance_metrics: true
  enable_wandb: false  # Set to true if using WandB

  compile: false
