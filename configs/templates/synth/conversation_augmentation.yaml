# Oumi Synth Template: Conversation Augmentation
# Generate multi-turn dialogue from context or seed conversations
#
# Usage:
#   oumi onboard generate --template synth/conversation_augmentation --data ./your_data.csv -o ./conv_config.yaml
#
# Required: Replace ??? with your data path and map your columns

output_path: ???  # Required: path to save generated conversations (e.g., ./output/conversations.jsonl)

strategy: GENERAL

strategy_params:
  input_data:
    - path: ???  # Required: path to your data file
      attribute_map:
        # Map your columns. Common mappings:
        #   topic: topic           # Topic or subject for conversation
        #   context: context       # Background information
        #   persona: persona       # Character/persona description
        ???: topic

  generated_attributes:
    - id: user_turn_1_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You are simulating a curious user having a conversation about a topic.
            Ask natural, realistic questions that a real person might ask.
        - role: USER
          content: |
            Topic: {topic}

            Generate an opening question or message from a user starting a conversation about this topic.
            Make it natural and conversational.

            Format: User: <message>
      postprocessing_params:
        id: user_turn_1
        cut_prefix: "User:"
        strip_whitespace: true

    - id: assistant_turn_1_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You are a helpful, knowledgeable assistant having a conversation.
            Provide informative, engaging responses.
        - role: USER
          content: |
            Topic: {topic}
            User message: {user_turn_1}

            Respond helpfully to the user's message. Be informative but conversational.

            Format: Assistant: <response>
      postprocessing_params:
        id: assistant_turn_1
        cut_prefix: "Assistant:"
        strip_whitespace: true

    - id: user_turn_2_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You are simulating a curious user continuing a conversation.
            Ask follow-up questions based on the assistant's response.
        - role: USER
          content: |
            Topic: {topic}
            Previous exchange:
            User: {user_turn_1}
            Assistant: {assistant_turn_1}

            Generate a natural follow-up question or comment from the user.

            Format: User: <message>
      postprocessing_params:
        id: user_turn_2
        cut_prefix: "User:"
        strip_whitespace: true

    - id: assistant_turn_2_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You are a helpful assistant continuing a conversation.
            Build on the previous context while staying helpful and accurate.
        - role: USER
          content: |
            Topic: {topic}
            Conversation so far:
            User: {user_turn_1}
            Assistant: {assistant_turn_1}
            User: {user_turn_2}

            Continue the conversation with a helpful response.

            Format: Assistant: <response>
      postprocessing_params:
        id: assistant_turn_2
        cut_prefix: "Assistant:"
        strip_whitespace: true

  transformed_attributes:
    - id: conversation
      transformation_strategy:
        type: CHAT
        chat_transform:
          messages:
            - role: USER
              content: "{user_turn_1}"
            - role: ASSISTANT
              content: "{assistant_turn_1}"
            - role: USER
              content: "{user_turn_2}"
            - role: ASSISTANT
              content: "{assistant_turn_2}"

  passthrough_attributes:
    - conversation
    - topic

inference_config:
  model:
    model_name: claude-3-5-sonnet-20240620
    device_map: auto
  generation:
    max_new_tokens: 2048
    temperature: 0.8
    top_p: 0.95
  engine: ANTHROPIC
  remote_params:
    max_retries: 3
    num_workers: 50

num_samples: 100
