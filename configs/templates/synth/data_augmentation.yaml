# Oumi Synth Template: Data Augmentation
# Generate variations of existing data samples
#
# Usage:
#   oumi onboard generate --template synth/data_augmentation --data ./your_data.csv -o ./aug_config.yaml
#
# Best for: Expanding small datasets, improving model robustness

output_path: ???  # Required: path to save augmented data (e.g., ./output/augmented.jsonl)

strategy: GENERAL

strategy_params:
  input_data:
    - path: ???  # Required: path to your existing data
      attribute_map:
        # Map your text column to be augmented
        # Example: text: original_text
        ???: original_text

  generated_attributes:
    - id: variation_1_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You are an expert at creating natural variations of text while preserving meaning.
            Create variations that:
            - Maintain the same core meaning and information
            - Use different word choices and sentence structures
            - Sound natural and fluent
        - role: USER
          content: |
            Create a variation of the following text. Keep the same meaning but use different wording:

            Original: {original_text}

            Format: Variation: <your variation>
      postprocessing_params:
        id: variation_1
        cut_prefix: "Variation:"
        strip_whitespace: true

    - id: variation_2_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You are an expert at creating natural variations of text while preserving meaning.
            Create variations that are distinctly different from the original.
        - role: USER
          content: |
            Create another variation of this text, different from both the original and the first variation:

            Original: {original_text}
            First variation: {variation_1}

            Format: Variation: <your variation>
      postprocessing_params:
        id: variation_2
        cut_prefix: "Variation:"
        strip_whitespace: true

    - id: simplified_raw
      instruction_messages:
        - role: SYSTEM
          content: |
            You simplify text while keeping the essential meaning.
            Use simpler words and shorter sentences where possible.
        - role: USER
          content: |
            Simplify the following text while keeping the core meaning:

            Original: {original_text}

            Format: Simplified: <simplified version>
      postprocessing_params:
        id: simplified
        cut_prefix: "Simplified:"
        strip_whitespace: true

  passthrough_attributes:
    - original_text
    - variation_1
    - variation_2
    - simplified

inference_config:
  model:
    model_name: claude-3-5-sonnet-20240620
    device_map: auto
  generation:
    max_new_tokens: 1024
    temperature: 0.9
    top_p: 0.95
  engine: ANTHROPIC
  remote_params:
    max_retries: 3
    num_workers: 50

num_samples: 100
