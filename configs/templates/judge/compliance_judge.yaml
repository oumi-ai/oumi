# Oumi Judge Template: Compliance Evaluation
# Evaluate adherence to specific rules, guidelines, or policies
#
# Usage:
#   oumi onboard generate --template judge/compliance_judge --data ./your_data.csv -o ./compliance_config.yaml
#
# Best for: Policy compliance, guideline adherence, regulatory checks

judge_params:
  system_instruction: |
    You are an expert compliance evaluator. Your task is to assess whether responses
    adhere to specified guidelines, rules, or policies.

    Evaluation criteria:
    - Does the response follow all stated rules?
    - Are there any violations of guidelines?
    - Is the response consistent with policy requirements?

    Be thorough but fair in your assessment.

  prompt_template: |
    Evaluate whether the following response complies with the given guidelines.

    [BEGIN DATA]
    ***
    [Guidelines/Rules]:
    {rules}
    ***
    [Request/Input]:
    {request}
    ***
    [Response to evaluate]:
    {response}
    ***
    [END DATA]

    Assess compliance with the guidelines. Consider:
    1. Does the response follow all stated rules?
    2. Are there any explicit violations?
    3. Are there any implicit violations or edge cases?

    Provide your judgment.

  response_format: JSON
  judgment_type: BOOL
  include_explanation: true

  # Optional: Define specific compliance criteria
  # criteria:
  #   - name: "rule_adherence"
  #     description: "Response follows explicit rules"
  #   - name: "policy_alignment"
  #     description: "Response aligns with policy intent"

inference_config:
  model:
    model_name: claude-3-5-sonnet-20240620
    device_map: auto
  engine: ANTHROPIC
  generation:
    max_new_tokens: 2048
    temperature: 0.0
  remote_params:
    max_retries: 3
    num_workers: 20
