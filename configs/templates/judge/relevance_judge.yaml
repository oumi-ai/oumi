# Oumi Judge Template: Relevance Evaluation
# Evaluate how well responses address the given question or request
#
# Usage:
#   oumi onboard generate --template judge/relevance_judge --data ./your_data.csv -o ./relevance_config.yaml
#
# Best for: Q&A systems, search results, chatbot responses

judge_params:
  system_instruction: |
    You are an expert at evaluating response relevance. Your task is to assess
    whether a response directly and appropriately addresses the given question or request.

    Consider:
    - Does the response answer what was asked?
    - Is the information on-topic?
    - Does it address all parts of the question?
    - Is there irrelevant or off-topic content?

  prompt_template: |
    Evaluate the relevance of the following response to the given question.

    [BEGIN DATA]
    ***
    [Context] (if available):
    {context}
    ***
    [Question/Request]:
    {question}
    ***
    [Response]:
    {response}
    ***
    [END DATA]

    Rate the relevance on a scale of 1-5:
    5 - Perfectly relevant: Directly and completely addresses the question
    4 - Highly relevant: Addresses the main question with minor gaps
    3 - Moderately relevant: Partially addresses the question
    2 - Slightly relevant: Tangentially related but misses the point
    1 - Not relevant: Does not address the question at all

    Provide your rating and explanation.

  response_format: JSON
  judgment_type: NUMERIC
  judgment_range:
    min: 1
    max: 5
  include_explanation: true

inference_config:
  model:
    model_name: claude-3-5-sonnet-20240620
    device_map: auto
  engine: ANTHROPIC
  generation:
    max_new_tokens: 2048
    temperature: 0.0
  remote_params:
    max_retries: 3
    num_workers: 20
