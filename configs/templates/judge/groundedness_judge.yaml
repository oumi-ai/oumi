# Oumi Judge Template: Groundedness Evaluation
# Evaluate whether claims in responses are supported by provided context
#
# Usage:
#   oumi onboard generate --template judge/groundedness_judge --data ./your_data.csv -o ./groundedness_config.yaml
#
# Best for: RAG systems, factual accuracy, hallucination detection

judge_params:
  system_instruction: |
    You are an expert at evaluating factual groundedness. Your task is to assess
    whether claims made in a response are supported by the provided source context.

    Key principles:
    - Every factual claim should be traceable to the context
    - Unsupported claims are hallucinations
    - Reasonable inferences from context are acceptable
    - Opinions stated as facts without support are problematic

  prompt_template: |
    Evaluate whether the response is grounded in the provided context.

    [BEGIN DATA]
    ***
    [Source Context]:
    {context}
    ***
    [Question]:
    {question}
    ***
    [Response to evaluate]:
    {response}
    ***
    [END DATA]

    For each factual claim in the response:
    1. Can it be verified from the context?
    2. Is it a reasonable inference from the context?
    3. Is it unsupported (hallucination)?

    Rate groundedness on a scale of 1-5:
    5 - Fully grounded: All claims supported by context
    4 - Mostly grounded: Minor unsupported details
    3 - Partially grounded: Mix of supported and unsupported claims
    2 - Weakly grounded: Most claims lack support
    1 - Not grounded: Significant hallucinations

    List any unsupported claims found.

  response_format: JSON
  judgment_type: NUMERIC
  judgment_range:
    min: 1
    max: 5
  include_explanation: true

  # Additional output fields
  extra_fields:
    - unsupported_claims
    - supported_claims

inference_config:
  model:
    model_name: claude-3-5-sonnet-20240620
    device_map: auto
  engine: ANTHROPIC
  generation:
    max_new_tokens: 2048
    temperature: 0.0
  remote_params:
    max_retries: 3
    num_workers: 20
