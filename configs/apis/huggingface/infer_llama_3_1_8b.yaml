# HuggingFace Inference Providers config for Llama 3.1 8B Instruct.
#
# Requirements:
#   - Set environment variable: export HF_TOKEN=your_hf_token
#     (Token must have the "Make calls to Inference Providers" permission.)
#
# Provider routing:
#   The HF router parses an optional provider/policy suffix off the model name
#   server-side. Just include it on `model_name`:
#     - "meta-llama/Llama-3.1-8B-Instruct"            -> auto-route (`:fastest`)
#     - "meta-llama/Llama-3.1-8B-Instruct:cheapest"   -> lowest price per token
#     - "meta-llama/Llama-3.1-8B-Instruct:preferred"  -> your preference order
#     - "meta-llama/Llama-3.1-8B-Instruct:together"   -> pin to Together AI
#
# Usage:
#   oumi infer -i -c configs/apis/huggingface/infer_llama_3_1_8b.yaml
#
# See Also:
#   - HuggingFace Inference Providers: https://huggingface.co/docs/inference-providers/index
#   - Oumi infer docs: https://oumi.ai/docs/en/latest/user_guides/infer/infer.html

model:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"

engine: HUGGING_FACE_ROUTER

generation:
  max_new_tokens: 4096
  temperature: 0.7
