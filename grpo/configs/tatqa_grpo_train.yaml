model:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  model_max_length: 2048
  load_pretrained_weights: true
  trust_remote_code: true
  attn_implementation: "sdpa"
  device_map: "auto"

data:
  train:
    datasets:
      - dataset_name: tatqa_data
        dataset_path: /data/shanghong/oumi/gold/tatqa_data/train_final_with_groundtruth_max2048.jsonl
        shuffle: true
        seed: 42

training:
  trainer_type: "TRL_GRPO"
  output_dir: "output/grpo_tatqa_qwen2.5-1.5b"
  run_name: "grpo_tatqa_test"

  # Short test run (100 steps for verification)
  max_steps: 100
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  max_grad_norm: 1

  # Mixed precision and performance
  enable_gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false

  # Optimization
  optimizer: "adamw_torch"
  learning_rate: 1.0e-5

  # Learning rate schedule
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01

  # Checkpointing
  save_steps: 50

  # Logging
  logging_steps: 1
  log_level: "info"
  enable_wandb: false
  enable_mlflow: true

  ddp_find_unused_parameters: false
  dataloader_num_workers: "auto"
  empty_device_cache_steps: 50

  # TatQA reward function
  reward_functions: ["tatqa"]
  reward_function_kwargs:
    tatqa:
      judge_config_file: "/data/shanghong/oumi/grpo/configs/tatqa_judge_config.yaml"
      use_judge: true
      format_score: 0.0
      correct_score: 1.0

  trainer_kwargs:
    beta: 0.1
    group_by_length: true

  grpo:
    max_prompt_length: 1800
    max_completion_length: 512
    num_generations: 4
    use_vllm: true
    vllm_mode: "colocate"
    vllm_gpu_memory_utilization: 0.4
    log_completions: true
