{% macro label_badge(label) %}
<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium"
      style="background-color: #{{ label.color }}22; color: #{{ label.color }}; border: 1px solid #{{ label.color }}44;">
  {{ label.name }}
</span>
{% endmacro %}

{% macro state_badge(state, merged_at=None, draft=False) %}
{% if draft %}
<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-muted text-muted-foreground border border-border">
  <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 16 16"><path d="M14.307 11.655a.75.75 0 0 1 .165 1.048 8.05 8.05 0 0 1-1.769 1.77.75.75 0 0 1-.883-1.214 6.552 6.552 0 0 0 1.44-1.439.75.75 0 0 1 1.047-.165zm-2.652 3.01a.75.75 0 0 1-.884 1.215 8.02 8.02 0 0 1-2.119-.992.75.75 0 1 1 .836-1.244 6.535 6.535 0 0 0 1.727.808ZM3.86 2.358A7.96 7.96 0 0 1 8 1c.089 0 .178.002.266.006.393.019.67.35.651.73a.74.74 0 0 1-.73.65A6.5 6.5 0 0 0 1.5 8a6.5 6.5 0 0 0 1.5 4.16v-1.91a.75.75 0 0 1 1.5 0V13.5a.75.75 0 0 1-.75.75H2.25a.75.75 0 0 1 0-1.5H3.3A8 8 0 0 1 3.86 2.358Z"/></svg>
  Draft
</span>
{% elif merged_at %}
<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-purple-50 text-purple-700 border border-purple-200">
  <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 16 16"><path d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218z"/></svg>
  Merged
</span>
{% elif state == "open" %}
<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-green-50 text-green-700 border border-green-200">
  <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 16 16"><circle cx="8" cy="8" r="4"/></svg>
  Open
</span>
{% elif state == "closed" %}
<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-red-50 text-red-700 border border-red-200">
  <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 16 16"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/></svg>
  Closed
</span>
{% endif %}
{% endmacro %}
