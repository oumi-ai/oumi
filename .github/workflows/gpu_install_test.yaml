name: "GPU Installation Test"

permissions:
  contents: "read"

on:
  pull_request:
    paths:
      - "pyproject.toml"
  workflow_dispatch:

env:
  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_OUMI: v0.0.1
  NCCL_DEBUG: INFO
  DO_NOT_TRACK: "1"

jobs:
  gpu-install-test:
    permissions:
      contents: "read"
    runs-on: linux-gpu-runner
    container:
      image: ${{ matrix.cuda-image }}

    strategy:
      fail-fast: false
      matrix:
        # Each row installs `oumi[torch29,tf4,<cuda-extra>,dev,synthesis]`.
        # `cuda-extra` selects the pytorch wheel index via [tool.uv.sources]
        # in pyproject.toml. pytorch dropped cu124 wheels after torch 2.6,
        # so CUDA 12.2 / 12.4 drivers forward-route to cuda126 (cu126
        # wheels are forward-compatible via CUDA enhanced compatibility).
        include:
          - cuda-version: "12.2.2"
            cuda-image: "nvidia/cuda:12.2.2-cudnn8-devel-ubuntu22.04"
            python-version: "3.11"
            cuda-extra: "cuda126"
          - cuda-version: "12.4.1"
            cuda-image: "nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04"
            python-version: "3.11"
            cuda-extra: "cuda126"
          - cuda-version: "12.6.3"
            cuda-image: "nvidia/cuda:12.6.3-cudnn-devel-ubuntu22.04"
            python-version: "3.11"
            cuda-extra: "cuda126"
          - cuda-version: "12.8.1"
            cuda-image: "nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04"
            python-version: "3.11"
            cuda-extra: "cuda128"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y libcurl4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache HuggingFace Models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
          key: hf-models-${{ runner.os }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Install oumi (torch29 + tf4 + ${{ matrix.cuda-extra }})
        env:
          CUDA_EXTRA: ${{ matrix.cuda-extra }}
        run: |
          uv pip install --system -e ".[torch29,tf4,dev,synthesis,${CUDA_EXTRA}]"

      - name: Verify GPU installation
        run: |
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          python -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}')"
          python -c "import torch; print(f'CUDA version: {torch.version.cuda}')"

          # Test GPU tensor operations
          oumi env

      - name: Run tests
        run: |
          cd ./tests/unit/
          pytest -s -m "not e2e and not e2e_eternal and not single_gpu and not multi_gpu" --durations=50 --timeout=300
